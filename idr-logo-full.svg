<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" width="320" height="80">
  <defs>
    <style>
      .logo-text { font-family: 'Arial Black', sans-serif; font-weight: 900; letter-spacing: 0.08em; }
      .logo-sub  { font-family: Arial, sans-serif; font-weight: 400; letter-spacing: 0.18em; }
    </style>
  </defs>

  <!-- Cube icon: isometric 3-face cube -->
  <!-- Top face -->
  <polygon points="40,10 64,23 40,36 16,23" fill="#FF6B00"/>
  <!-- Left face -->
  <polygon points="16,23 40,36 40,62 16,49" fill="#1a1a1a"/>
  <!-- Right face -->
  <polygon points="64,23 40,36 40,62 64,49" fill="#333333"/>
  <!-- Inner cube highlight lines -->
  <line x1="40" y1="36" x2="40" y2="62" stroke="#FF6B00" stroke-width="0.8" opacity="0.5"/>
  <line x1="40" y1="36" x2="16" y2="23" stroke="#FF6B00" stroke-width="0.8" opacity="0.3"/>
  <line x1="40" y1="36" x2="64" y2="23" stroke="#FF6B00" stroke-width="0.8" opacity="0.3"/>

  <!-- Text: IDR -->
  <text x="88" y="42" class="logo-text" font-size="32" fill="#1a1a1a">IDR</text>

  <!-- Divider line -->
  <line x1="88" y1="50" x2="310" y2="50" stroke="#FF6B00" stroke-width="1.5"/>

  <!-- Subtext -->
  <text x="89" y="64" class="logo-sub" font-size="9" fill="#555555">INSTITUTE OF DIGITAL RISK</text>
</svg>
